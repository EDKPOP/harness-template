# Harness Pipeline Configuration v2.0
# Initializer Agent가 프로젝트 설정 시 이 파일을 채웁니다.
# 직접 편집해도 됩니다.

# 하네스 메타데이터
harness:
  version: "2.0"        # vibecoding 스킬 버전
  created_at: ""         # 생성일 (Initializer가 채움)
  last_migrated: null    # 마이그레이션 일시

project:
  name: ""               # 프로젝트명
  description: ""        # 프로젝트 설명

# 기술 스택
stack:
  language: ""           # typescript | python | go | rust | java
  runtime: ""            # node 20+ | python 3.12+ | go 1.22+
  framework: ""          # next.js | fastapi | gin | 없음
  test: ""               # vitest | pytest | go test
  package_manager: ""    # pnpm | npm | pip | cargo

# 에이전트 설정
agents:
  planner:
    engine: gemini       # gemini | claude | codex
    role_file: ".harness/roles/planner.md"

  implementer:
    engine: claude
    role_file: ".harness/roles/implementer.md"

  reviewer:
    engine: codex
    role_file: ".harness/roles/reviewer.md"

# 파이프라인 설정
pipeline:
  phases:
    - plan
    - implement
    - review

  scale: project         # hotfix | feature | project

  loop:
    max_iterations: 3
    pass_on:
      - "PASS"
      - "WARNING_ONLY"
    fail_action: "notify" # notify | stop

# 산출물 관리
artifacts:
  directory: ".harness/artifacts"
  keep_history: true

# 학습 축적
learnings:
  file: ".harness/learnings.md"
  auto_extract: true
  inject_to_implement: true
