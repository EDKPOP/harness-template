# Harness Pipeline Configuration v3.1
# Role-oriented multi-model orchestration is the primary design principle.
# Default engine assignments reflect model strengths per role.
# Engine Resolution (Phase 0) confirms availability and applies fallbacks before execution.

harness:
  version: "3.1"
  created_at: ""
  last_migrated: null
  template_version: "v3.1"
  adapter_mode: "native-preferred"

project:
  name: ""
  description: ""

stack:
  language: ""
  runtime: ""
  framework: ""
  test: ""
  package_manager: ""

# === Principle 0: Role-Oriented Multi-Model Orchestration ===
# Each role maps to the engine best suited for it.
# These are defaults; Engine Resolution may override based on availability.

agents:
  initializer:
    engine: claude
    role_file: ".harness/roles/initializer.md"

  explorer:
    engine: gemini
    role_file: ".harness/roles/code-explorer.md"

  architect:
    engine: gemini
    role_file: ".harness/roles/code-architect.md"

  planner:
    engine: gemini
    role_file: ".harness/roles/planner.md"

  implementer:
    engine: claude
    role_file: ".harness/roles/implementer.md"

  reviewer:
    engine: codex
    role_file: ".harness/roles/reviewer.md"

  silent_failure_hunter:
    engine: codex
    role_file: ".harness/roles/silent-failure-hunter.md"

  pr_test_analyzer:
    engine: codex
    role_file: ".harness/roles/pr-test-analyzer.md"

  harness_optimizer:
    engine: claude
    role_file: ".harness/roles/harness-optimizer.md"

# Engine availability — populated by engine-resolver.mjs during Phase 0
engine_status:
  gemini: "pending"    # ready | installed-not-authenticated | unavailable | degraded
  claude: "pending"
  codex: "pending"

# Fallback chain — applied when default engine is unavailable
engine_fallback:
  gemini: ["claude", "codex"]
  claude: ["codex", "gemini"]
  codex: ["claude", "gemini"]

# Engine overrides — populated when fallback is applied
engine_overrides: {}
# Example when Codex is unavailable:
# engine_overrides:
#   reviewer: claude        # was codex, fell back to claude
#   silent_failure_hunter: claude
#   pr_test_analyzer: claude

pipeline:
  phases:
    - engine-resolution   # Phase 0: detect engines, resolve mapping
    - intake
    - audit
    - discover
    - plan
    - implement
    - gate
    - review
    - optimize

  scale: project

  auto_advance: true

  approval_gates:
    - plan-approved
    - destructive-migration
    - public-deploy
    - cli-fallback           # triggered when engine fallback is applied

  role_routing:
    adopt_requires:
      - explorer
      - planner
    structural_change_requires:
      - architect
    hidden_failure_requires:
      - silent_failure_hunter
    weak_test_signal_requires:
      - pr_test_analyzer
    repeated_failure_requires:
      - harness_optimizer
    ambiguous_scope_requires:
      - council

  loop:
    max_iterations: 3
    max_same_failure: 2
    no_progress_timeout_minutes: 15
    pass_on:
      - "PASS"
      - "WARNING_ONLY"
    fail_action: "notify"

artifacts:
  directory: ".harness/artifacts"
  keep_history: true

quality:
  gate_file: ".harness/quality-gates.json"
  require_all_mandatory: true

audit:
  spec_file: ".harness/audit-spec.json"
  required_before_run: true

learning:
  learnings_file: ".harness/learnings.md"
  patterns_dir: ".harness/patterns"
  instincts_dir: ".harness/instincts"
  auto_extract: true
  escalate_after_repeats: 2
  instinct_after_repeats: 3

# Budget and runtime limits — prevents runaway agent execution
budget:
  max_duration_minutes: 60
  max_agent_calls: 20
  agent_timeout_seconds: 600
  inactivity_timeout_seconds: 120

# Anti-stall configuration
anti_stall:
  streaming_capture: true
  heartbeat_interval_seconds: 30
  config_protection: true
