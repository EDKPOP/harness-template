# Harness Pipeline Configuration v3.0
# Initializer Agent가 프로젝트 설정 시 이 파일을 채운다.
# 직접 편집도 가능하지만, 하네스 상태와 어긋나지 않게 유지해야 한다.

harness:
  version: "3.0"
  created_at: ""
  last_migrated: null
  template_version: "v3"
  adapter_mode: "native-preferred"

project:
  name: ""
  description: ""

stack:
  language: ""
  runtime: ""
  framework: ""
  test: ""
  package_manager: ""

agents:
  initializer:
    engine: claude
    role_file: ".harness/roles/initializer.md"

  explorer:
    engine: gemini
    role_file: ".harness/roles/code-explorer.md"

  architect:
    engine: gemini
    role_file: ".harness/roles/code-architect.md"

  planner:
    engine: gemini
    role_file: ".harness/roles/planner.md"

  implementer:
    engine: claude
    role_file: ".harness/roles/implementer.md"

  reviewer:
    engine: codex
    role_file: ".harness/roles/reviewer.md"

  silent_failure_hunter:
    engine: codex
    role_file: ".harness/roles/silent-failure-hunter.md"

  pr_test_analyzer:
    engine: codex
    role_file: ".harness/roles/pr-test-analyzer.md"

  harness_optimizer:
    engine: claude
    role_file: ".harness/roles/harness-optimizer.md"

pipeline:
  phases:
    - intake
    - audit
    - discover
    - plan
    - implement
    - gate
    - review
    - optimize

  scale: project

  loop:
    max_iterations: 3
    max_same_failure: 2
    no_progress_timeout_minutes: 15
    pass_on:
      - "PASS"
      - "WARNING_ONLY"
    fail_action: "notify"

artifacts:
  directory: ".harness/artifacts"
  keep_history: true

quality:
  gate_file: ".harness/quality-gates.json"
  require_all_mandatory: true

audit:
  spec_file: ".harness/audit-spec.json"
  required_before_run: true

learning:
  learnings_file: ".harness/learnings.md"
  patterns_dir: ".harness/patterns"
  auto_extract: true
  escalate_after_repeats: 2
