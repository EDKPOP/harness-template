# Harness Pipeline Configuration
# 이 파일은 OpenClaw 스킬의 대화형 설정(`harness init`)을 통해 생성됩니다.
# 직접 편집해도 되지만, 스킬을 통해 생성하는 것을 권장합니다.

project:
  name: ""          # 프로젝트명 (harness init 시 설정)
  description: ""   # 프로젝트 설명

# 기술 스택 (harness init 시 설정)
stack:
  language: ""      # typescript | python | go | rust | java | etc.
  runtime: ""       # node 20+ | python 3.12+ | go 1.22+ | etc.
  framework: ""     # next.js | fastapi | gin | etc.
  test: ""          # vitest | pytest | go test | etc.
  package_manager: "" # pnpm | npm | pip | go mod | cargo | etc.

# 에이전트별 설정
agents:
  planner:
    engine: gemini  # gemini | claude | codex | any
    role_file: ".harness/roles/planner.md"

  implementer:
    engine: claude   # gemini | claude | codex | any
    role_file: ".harness/roles/implementer.md"

  reviewer:
    engine: codex    # gemini | claude | codex | any
    role_file: ".harness/roles/reviewer.md"

# 파이프라인 설정
pipeline:
  phases:
    - plan
    - implement
    - review

  loop:
    max_iterations: 3
    pass_on:
      - "PASS"
      - "WARNING_ONLY"
    fail_action: "notify"  # notify | stop

# 산출물 관리
artifacts:
  directory: ".harness/artifacts"
  keep_history: true

# 학습 축적
learnings:
  file: ".harness/learnings.md"
  auto_extract: true
  inject_to_implement: true
